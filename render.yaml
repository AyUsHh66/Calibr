services: 
  - type: web 
    name: calibr-api 
    runtime: python 
    rootDir: backend 
    buildCommand: pip install -r requirements.txt 
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT 
    envVars: 
      - key: GROQ_API_KEY 
        sync: false 
      - key: TAVILY_API_KEY 
        sync: false 
      - key: DATABASE_URL 
        value: sqlite:///./calibr.db 
      - key: CORS_ORIGINS 
        value: https://calibr-zeta.vercel.app 
    healthCheckPath: /health
