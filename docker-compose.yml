version: '3.8'

services:
  calibr-backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/data:/app/data

  calibr-frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - calibr-backend
    environment:
      - VITE_API_URL=http://localhost:8000
